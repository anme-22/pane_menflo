<p-toast />

<section class="mx-auto flex max-w-4xl flex-col gap-6">
  <div class="flex items-center justify-between gap-3">
    <div>
      <h1 class="text-2xl font-bold text-primary-600">Proveedores</h1>
      <p class="text-sm text-muted">A quién le compras los insumos.</p>
    </div>
    <p-button label="Nuevo proveedor" icon="pi pi-plus" (onClick)="abrirNuevo()" />
  </div>

  <div
    class="overflow-hidden rounded-xl border"
    style="background-color: var(--surface-card); border-color: var(--surface-border)"
  >
    <p-table
      [value]="proveedores()"
      [loading]="cargando()"
      responsiveLayout="stack"
      [breakpoint]="'640px'"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Estado</th>
          <th class="text-right">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-p>
        <tr>
          <td><span class="p-column-title font-medium sm:hidden">Nombre </span>{{ p.nombre }}</td>
          <td>
            <span class="p-column-title font-medium sm:hidden">Teléfono </span>
            {{ p.telefono || '—' }}
          </td>
          <td>
            <span class="p-column-title font-medium sm:hidden">Estado </span>
            @if (p.activo) {
              <p-tag value="Activo" severity="success" />
            } @else {
              <p-tag value="Inactivo" severity="secondary" />
            }
          </td>
          <td class="text-right">
            <span class="p-column-title font-medium sm:hidden">Acciones </span>
            <p-button
              icon="pi pi-pencil"
              label="Editar"
              severity="secondary"
              [text]="true"
              size="small"
              (onClick)="abrirEdicion(p)"
            />
            <p-button
              [icon]="p.activo ? 'pi pi-ban' : 'pi pi-check'"
              [severity]="p.activo ? 'danger' : 'success'"
              [text]="true"
              size="small"
              [label]="p.activo ? 'Desactivar' : 'Activar'"
              (onClick)="cambiarEstado(p)"
            />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="p-4 text-center text-muted">No hay proveedores todavía.</td></tr>
      </ng-template>
    </p-table>
  </div>
</section>

<!-- Diálogo crear/editar -->
<p-dialog
  [visible]="formVisible()"
  (visibleChange)="formVisible.set($event)"
  [modal]="true"
  [style]="{ width: '26rem' }"
  [header]="editandoId() === null ? 'Nuevo proveedor' : 'Editar proveedor'"
  [dismissableMask]="true"
>
  <form [formGroup]="form" (ngSubmit)="guardar()" class="flex flex-col gap-4 pt-2">
    <div class="flex flex-col gap-1">
      <label for="nombre" class="text-sm font-medium">Nombre</label>
      <input id="nombre" pInputText formControlName="nombre" class="w-full" placeholder="Ej.: Molinos S.A." />
    </div>
    <div class="flex flex-col gap-1">
      <label for="telefono" class="text-sm font-medium">Teléfono <span class="text-muted">(opcional)</span></label>
      <input id="telefono" pInputText formControlName="telefono" class="w-full" placeholder="Ej.: 2200-0000" />
    </div>

    <div class="mt-1 flex justify-end gap-2">
      <p-button
        type="button"
        label="Cancelar"
        severity="secondary"
        [text]="true"
        (onClick)="formVisible.set(false)"
      />
      <p-button
        type="submit"
        label="Guardar"
        icon="pi pi-check"
        [loading]="guardando()"
        [disabled]="form.invalid || guardando()"
      />
    </div>
  </form>
</p-dialog>
