<main class="flex min-h-screen flex-col items-center justify-center gap-8 p-6">
  <header class="text-center">
    <h1 class="text-3xl font-bold text-primary-600">🥖 Panadería</h1>
    <p class="mt-2 text-muted">
      Feature 1 — monorepo, theming centralizado y modo oscuro funcionando.
    </p>
  </header>

  <!-- Tarjeta: superficies leídas desde las variables CSS (cambian con el tema) -->
  <section
    class="flex w-full max-w-md flex-col gap-5 rounded-xl border p-6 shadow-sm"
    style="background-color: var(--surface-card); border-color: var(--surface-border)"
  >
    <div class="flex items-center justify-between gap-4">
      <span>
        Tema:
        <strong>{{ theme.isDark() ? 'Oscuro' : 'Claro' }}</strong>
      </span>

      <!-- Botón de PrimeNG: debe verse NARANJA en claro y oscuro -->
      <p-button
        [label]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
        [icon]="theme.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
        (onClick)="theme.toggle()"
      />
    </div>

    <p class="text-sm text-muted">
      El botón de arriba es de PrimeNG. Los de abajo muestran que Tailwind y
      PrimeNG comparten la misma paleta primaria (naranja).
    </p>

    <div class="flex flex-wrap items-center gap-2">
      <p-button label="Primario" />
      <p-button label="Secundario" severity="secondary" />
      <!-- Botón nativo con utilidades Tailwind que leen --color-primary-* -->
      <button
        type="button"
        class="rounded-lg bg-primary-500 px-4 py-2 font-medium text-white transition-colors hover:bg-primary-600"
        (click)="theme.toggle()"
      >
        Tailwind bg-primary-500
      </button>
    </div>
  </section>
</main>
